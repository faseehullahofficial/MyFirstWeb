<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>

    <style>
        .parent {
            width: 50%;
            height: 50vh;
            border: 1px solid;
            position: relative;

        }
        .child1 {
            width: 10%;
            height: 5%;
            background-color: red;
            position: absolute;
            top: 10px;
            transition: all ease-in-out 0.5s;
        }
        .child1:hover {
            top: 0;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child1"></div>
    </div>
</body>
</html>
