<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            width:500px;
            height:400px;
            border:2px solid red;
            margin:100px auto;
            position: relative;
        }
        .child-1{
            width:100px;
            height:100px;
            background-color: red;
            position: absolute;
            bottom:0;
            /* left:50px; */
            right: 10px;
            z-index: 1;
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            /* animation:move 2s linear infinite; */
        }
        @keyframes move {
            0%{
                top:0px;
            }
            50%{
                top:50px;
            }
            100%{
                top:0px;
            }
        }
        .child-2{
            width:100px;
            height:100px;
            background-color: blue;
            position: absolute;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child-1">1</div>
        <div class="child-2">2</div>
    </div>
</body>
</html>
